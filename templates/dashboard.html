<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Pujan's App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b14;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --accent: #43e97b;
      --accent2: #38f9d7;
      --text: #f0f0f5;
      --muted: #7a7a9a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; }
    .blob2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(67,233,123,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(67,233,123,0.04) 1px, transparent 1px);
      background-size: 40px 40px; z-index: 0; pointer-events: none;
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 460px; padding: 20px;
      animation: popIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px; padding: 48px 36px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      text-align: center;
    }

    .success-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 24px;
      box-shadow: 0 0 0 12px rgba(67,233,123,0.1), 0 0 0 24px rgba(67,233,123,0.05);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 12px rgba(67,233,123,0.1), 0 0 0 24px rgba(67,233,123,0.05); }
      50% { box-shadow: 0 0 0 16px rgba(67,233,123,0.15), 0 0 0 32px rgba(67,233,123,0.07); }
    }

    .card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      margin-bottom: 10px;
    }
    .card h2 span { color: var(--accent); }

    .card p {
      color: var(--muted); font-size: 15px;
      line-height: 1.6; margin-bottom: 32px;
    }

    .info-box {
      background: rgba(67,233,123,0.07);
      border: 1px solid rgba(67,233,123,0.2);
      border-radius: 14px; padding: 16px 20px;
      margin-bottom: 28px; text-align: left;
    }
    .info-box .label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
    }
    .info-box .value {
      font-family: 'Syne', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--accent);
    }

    .btn-logout {
      display: inline-block; padding: 13px 32px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-logout:hover {
      background: rgba(255,107,107,0.12);
      border-color: rgba(255,107,107,0.4);
      color: #ff6b6b; transform: translateY(-2px);
    }

    .footer { text-align: center; margin-top: 24px; color: #3a3a55; font-size: 12px; }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="container">
    <div class="card">
      <div class="success-ring">🎉</div>
      <h2>Welcome, <span>{{ username }}</span>!</h2>
      <p>You've successfully logged in to Pujan's App. Your credentials were validated and everything looks great!</p>

      <div class="info-box">
        <div class="label">Logged in as</div>
        <div class="value">@{{ username }}</div>
      </div>

      <a href="/logout" class="btn-logout">Sign Out →</a>
    </div>
    <div class="footer">Built by Pujan · Flask + HTML Assignment</div>
  </div>
</body>
</html>
